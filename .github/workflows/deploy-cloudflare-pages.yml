name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths: ['3d-viewer/**', '.github/workflows/deploy-cloudflare-pages.yml']
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # sparse checkout: only the deployable app, not the 700MB+ reference set
      - uses: actions/checkout@v4
        with:
          sparse-checkout: 3d-viewer
          sparse-checkout-cone-mode: false

      # create the Pages project on first run; harmless (ignored) once it exists
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages project create hongkong-3d-model --production-branch=main || true

      - name: Deploy 3d-viewer to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy 3d-viewer --project-name=hongkong-3d-model --branch=main
