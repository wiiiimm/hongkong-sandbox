name: Deploy to Cloudflare Pages

# Production moved to Vercel (HKS-47). The automatic push-to-main deploy is
# disabled so we don't double-deploy — but this workflow is kept as a manual
# rollback: run it (Actions → "Run workflow", or `gh workflow run
# deploy-cloudflare-pages.yml`) to refresh the Cloudflare Pages project before
# flipping DNS back to Cloudflare if Vercel ever has a problem. All the CF code
# (functions/_middleware.js, _routes.json, _headers) stays in the repo.
on:
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # sparse checkout: only the deployable app, not the 700MB+ reference set
      - uses: actions/checkout@v4
        with:
          sparse-checkout: 3d-viewer
          sparse-checkout-cone-mode: false

      # create the Pages project on first run; harmless (ignored) once it exists
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages project create hongkong-sandbox --production-branch=main || true

      # run from 3d-viewer/ so wrangler picks up 3d-viewer/functions/ (the locale
      # middleware) — it looks for functions/ in the working directory, not the asset arg
      - name: Deploy 3d-viewer to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 3d-viewer
          command: pages deploy . --project-name=hongkong-sandbox --branch=main
