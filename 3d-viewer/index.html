<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hong Kong — 3D terrain</title>
<style>
  :root{
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", "Noto Sans CJK TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --ink:#eef2f6; --sub:#7d8896;
    --panel:rgba(11,14,19,.72); --edge:rgba(255,255,255,.09); --edge-soft:rgba(255,255,255,.055);
    --field:rgba(255,255,255,.045); --field-edge:rgba(255,255,255,.11);
    --accent:#3fe0b0; --accent-dim:rgba(63,224,176,.16);
  }
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0e12;color:var(--ink);
    font-family:var(--sans);font-size:13px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  #app{position:fixed;inset:0}
  #panel{position:fixed;top:16px;left:16px;z-index:20;
    background:var(--panel);backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25);
    border:1px solid var(--edge);border-radius:14px;padding:14px 15px;font-size:12.5px;line-height:1.5;
    width:322px;max-width:calc(100vw - 32px);max-height:calc(100vh - 32px);overflow:auto;
    box-shadow:0 12px 44px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05)}
  #panel::-webkit-scrollbar{width:8px}
  #panel::-webkit-scrollbar-thumb{background:var(--field-edge);border-radius:4px}
  #panel h1{font-size:14px;margin:0;letter-spacing:.01em;font-weight:600}
  #panel .sub{color:var(--sub);font-size:10.5px;font-family:var(--mono);margin:9px 0 2px;min-height:14px}
  #phead{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .pbtns{display:flex;gap:5px;flex:0 0 auto}
  .pbtns button, #collapsedbar button{width:26px;height:26px;padding:0;display:grid;place-items:center;font-size:14px;border-radius:8px}
  #navhelp{font-size:11px;color:var(--sub);line-height:1.7;border-top:1px solid var(--edge-soft);margin-top:10px;padding-top:9px}
  #navhelp b{color:var(--ink);font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-size:10px;font-family:var(--mono)}
  #collapsedbar{display:none;align-items:center;gap:10px}
  .navmini{font-size:11px;color:var(--sub);white-space:normal;max-width:210px;line-height:1.45}
  #panel.collapsed{width:auto;padding:10px 12px}
  #panel.collapsed #phead,#panel.collapsed #pbody,#panel.collapsed #navhelp{display:none}
  #panel.collapsed #collapsedbar{display:flex}
  .grp{border-top:1px solid var(--edge-soft);margin-top:12px;padding-top:11px}
  .grp .gt{font-size:9.5px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);opacity:.9;
    font-weight:600;margin-bottom:9px;font-family:var(--mono)}
  .row{display:flex;align-items:center;gap:10px;margin:8px 0}
  .row label.k{flex:0 0 76px;color:var(--sub);font-size:11.5px}
  input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;border-radius:3px;background:var(--field-edge);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:var(--accent);cursor:pointer;box-shadow:0 0 0 4px var(--accent-dim)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border:none;border-radius:50%;background:var(--accent);cursor:pointer}
  select{flex:1;min-width:0;-webkit-appearance:none;appearance:none;background:var(--field);color:var(--ink);
    border:1px solid var(--field-edge);border-radius:8px;padding:6px 26px 6px 10px;font-size:12px;font-family:var(--sans);cursor:pointer;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' fill='none' stroke='%237d8896' stroke-width='1.5'><path d='M1 1l4 4 4-4'/></svg>");
    background-repeat:no-repeat;background-position:right 10px center}
  select:hover{border-color:var(--accent)}
  select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
  option{background:#12161c;color:var(--ink)}
  input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
  .chk{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink);cursor:pointer}
  .chks{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px}
  button{background:var(--field);color:var(--ink);border:1px solid var(--field-edge);
    border-radius:8px;padding:6px 11px;cursor:pointer;font-size:11px;font-family:var(--sans);letter-spacing:.02em;
    transition:border-color .12s, background .12s}
  button:hover{background:rgba(255,255,255,.08);border-color:var(--accent)}
  .btns{display:flex;gap:6px;flex-wrap:wrap}
  #vev,#meshdensv{font-family:var(--mono);color:var(--accent)}
  .lbl{position:fixed;transform:translate(-50%,-100%);pointer-events:none;font-size:12px;white-space:nowrap;
    color:#fff;font-weight:600;letter-spacing:.02em;text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 3px rgba(0,0,0,.85)}
  .lbl small{display:block;font-weight:400;color:rgba(255,255,255,.72);font-size:9.5px;font-family:var(--mono);
    letter-spacing:0;text-align:center;margin-top:1px}
  .lbl:before{content:'';position:absolute;left:50%;top:100%;width:1px;height:10px;
    background:linear-gradient(rgba(255,255,255,.75),transparent);transform:translateX(-50%)}
</style>
</head>
<body>
<div id="app"></div>
<div id="panel">
  <div id="collapsedbar">
    <button id="expand-btn" title="Show controls">+</button>
    <span class="navmini">drag / 1‑finger rotate · scroll / pinch zoom · 2‑finger pan</span>
  </div>
  <div id="phead">
    <h1>香港 · Hong Kong 3D</h1>
    <div class="pbtns">
      <button id="navhelp-btn" title="How to navigate">?</button>
      <button id="collapse-btn" title="Collapse panel">–</button>
    </div>
  </div>
  <div id="navhelp" style="display:none">
    <b>Navigate</b><br>
    Mouse — drag rotate · scroll zoom · right‑drag pan<br>
    Touch — one finger rotate · pinch zoom · two‑finger pan<br>
    Reset — recenter the view
  </div>
  <div id="pbody">
  <div class="sub" id="note">Loading…</div>

  <div class="grp">
    <div class="row"><label class="k">Source</label>
      <select id="src">
        <option value="hk-landsd-5m" selected>Hong Kong · LandsD 5 m</option>
        <option value="hk-srtm">Hong Kong · AWS Terrarium ~30 m</option>
        <option value="lantau-hk5m">Lantau · LandsD 5 m</option>
        <option value="lantau-srtm30">Lantau · AWS Terrarium ~30 m</option>
      </select>
    </div>
    <div class="row"><label class="k">Surface</label>
      <select id="surf">
        <option value="none">None (no fill)</option>
        <option value="shaded" selected>Shaded relief</option>
        <option value="tint">Elevation tint (flat)</option>
        <option value="matte">Matte</option>
        <option value="solid">Solid colour</option>
        <option value="topo">Topographic (B50K)</option>
      </select>
    </div>
    <div class="row" id="solidrow" style="display:none"><label class="k">Fill colour</label>
      <input type="color" id="solidcolor" value="#262626" style="flex:0 0 34px;height:24px;padding:0;border:1px solid var(--field-edge);border-radius:6px;background:none;cursor:pointer"/>
      <input type="text" id="solidhex" value="#262626" spellcheck="false"
             style="flex:1;min-width:0;background:var(--field);color:var(--panel-ink);border:1px solid var(--field-edge);border-radius:6px;padding:4px 6px;font-size:12px;font-family:ui-monospace,monospace"/>
    </div>
    <div class="row" id="toporow" style="display:none"><label class="k">Map rotate</label>
      <button id="toporotL" title="rotate left">◄</button>
      <button id="toporotLf" title="rotate left 0.2°" style="opacity:.75">‹</button>
      <span id="toporotv" style="flex:1;text-align:center;font-family:var(--mono);color:var(--accent)">0.0°</span>
      <button id="toporotRf" title="rotate right 0.2°" style="opacity:.75">›</button>
      <button id="toporotR" title="rotate right">►</button>
      <button id="toporot0" title="reset to 0°">0</button>
    </div>
    <div class="row"><label class="k">Background</label>
      <select id="bg"><option value="dark">Dark</option><option value="paper">Paper</option></select>
    </div>
    <div class="row"><label class="k">Vertical ×</label>
      <input id="ve" type="range" min="1" max="9" step="0.1" value="2.8"/>
      <span id="vev" style="flex:0 0 26px;text-align:right">2.8</span>
    </div>
  </div>

  <div class="grp">
    <div class="gt">Mesh</div>
    <div class="row"><label class="chk" style="flex:1"><input type="checkbox" id="meshlines"/> Show mesh lines</label></div>
    <div class="row"><label class="k">Density</label>
      <input id="meshdens" type="range" min="1" max="12" step="1" value="12"/>
      <span id="meshdensv" style="flex:0 0 40px;text-align:right;font-size:11px;color:var(--panel-sub)">full</span>
    </div>
    <div class="row"><label class="k">Colour</label>
      <input type="color" id="mlcolor" value="#2a4c33" style="flex:0 0 34px;height:24px;padding:0;border:1px solid var(--field-edge);border-radius:6px;background:none;cursor:pointer"/>
      <input type="text" id="mlhex" value="#2a4c33" spellcheck="false"
             style="flex:1;min-width:0;background:var(--field);color:var(--panel-ink);border:1px solid var(--field-edge);border-radius:6px;padding:4px 6px;font-size:12px;font-family:ui-monospace,monospace"/>
      <button id="mlauto" title="Back to automatic colour" style="flex:0 0 auto;padding:5px 7px">auto</button>
    </div>
  </div>

  <div class="grp">
    <div class="gt">Overlays · stack on top</div>
    <div class="chks">
      <label class="chk"><input type="checkbox" id="water" checked/> Water</label>
      <label class="chk"><input type="checkbox" id="labels" checked/> Labels</label>
    </div>
    <div class="chks" id="layers" style="margin-top:4px"></div>
  </div>

  <div class="grp">
    <div class="gt">Auto‑spin (horizontal)</div>
    <div class="row"><label class="k">Direction</label>
      <select id="spindir"><option value="0">Off</option><option value="1" selected>⟳ Clockwise</option><option value="-1">⟲ Counter‑cw</option></select>
    </div>
    <div class="row"><label class="k">Speed</label>
      <input id="spinspd" type="range" min="0.15" max="3" step="0.05" value="1"/>
    </div>
  </div>

  <div class="grp btns">
    <button id="reset">Reset</button>
    <button id="south">South</button>
    <button id="top">Top‑down</button>
    <button id="copylink" title="Copy a link to this exact view">Copy link</button>
  </div>
  </div><!-- /#pbody -->
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
