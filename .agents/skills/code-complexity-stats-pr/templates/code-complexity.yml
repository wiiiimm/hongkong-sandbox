name: Code Complexity Stats
# [AUTOMATED] Posts scc + COCOMO code statistics as a sticky comment on every PR.
#
# Deliberately independent of any [skip ci] / [skip release] markers — these
# stats are informational and should always refresh on new commits.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# A PR comment is posted via the Issues API. `pull-requests: write` is enough to
# create/update it; `issues: write` is included belt-and-suspenders.
permissions:
  contents: read
  pull-requests: write
  issues: write

# One run per PR; a newer push cancels the older, still-running analysis.
# Keyed on PR number (not head_ref) so two different forks that happen to share
# a branch name can't cancel each other's runs.
concurrency:
  group: code-complexity-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# COCOMO cost/effort is driven by AVG_WAGE (ANNUAL, in whatever currency you
# want the dollar figure read as) and labelled with WAGE_LABEL. Defined once
# here so the number scc uses and the note in the comment can't drift apart.
# 360000 = HKD 30,000/month average developer salary.
env:
  AVG_WAGE: "360000"
  WAGE_LABEL: "HKD, assuming HKD 30,000/month average salary"

jobs:
  code-complexity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Fork PRs run with a read-only token (no write access, no secrets), so the
    # comment API call would 403 and turn the check red for external
    # contributors. Skip the whole job for fork PRs (still runs for same-repo
    # branches — the common case). See SKILL.md "Fork PRs can't post" for the
    # two-workflow alternative if you need stats on fork PRs too.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Nothing after checkout needs git write auth; don't leave the token
          # persisted in .git/config.
          persist-credentials: false

      - name: Install scc
        run: |
          # Pin a version for reproducibility — bump deliberately, don't track
          # "latest" (a silent format change would change every PR comment).
          # Match the tarball to the runner arch: x86_64 here; use arm64 on
          # ARM runners (e.g. ubuntu-24.04-arm) — and update SCC_SHA256 to that
          # asset's checksum (from the release's checksums.txt).
          SCC_VERSION="3.7.0"
          SCC_SHA256="3d9d65b00ca874c2b29151abe7e1480736f5229edc3ce8e4b2791460cdfabf5a"
          wget -qO scc.tar.gz "https://github.com/boyter/scc/releases/download/v${SCC_VERSION}/scc_Linux_x86_64.tar.gz"
          echo "${SCC_SHA256}  scc.tar.gz" | sha256sum -c -
          tar xzf scc.tar.gz scc
          sudo mv scc /usr/local/bin/

      - name: Run scc
        run: |
          # --avg-wage drives the COCOMO cost figure (see AVG_WAGE env above).
          # scc already honours .gitignore; --exclude-dir is belt-and-suspenders
          # for build output that isn't ignored.
          scc \
            --exclude-dir .git,node_modules,build,dist,.next,.turbo,out \
            --avg-wage "${AVG_WAGE}" \
            > scc-output.txt

      - name: Post sticky PR comment
        uses: actions/github-script@v9
        env:
          WAGE_LABEL: ${{ env.WAGE_LABEL }}
        with:
          # Prefer a bot/PAT secret if you have one; else the built-in token.
          github-token: ${{ secrets.GH_TOKEN || github.token }}
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('scc-output.txt', 'utf8');

            // GitHub caps comment bodies at 65,536 chars; leave room for the
            // wrapper so a huge --by-file run can't 422 the whole step. Trim to
            // the last newline before the cap so we don't cut a table row.
            const MAX = 64000;
            let output = raw;
            if (raw.length > MAX) {
              const head = raw.slice(0, MAX);
              const nl = head.lastIndexOf('\n');
              output =
                (nl > 0 ? head.slice(0, nl) : head) +
                '\n…truncated (exceeded GitHub comment limit)';
            }

            // Hidden marker identifies our comment so we update (not duplicate) it.
            const marker = '<!-- code-complexity -->';
            const body = [
              marker,
              '## 📊 Code Complexity Analysis',
              '',
              '```',
              output,
              '```',
              '',
              '_Generated by [scc](https://github.com/boyter/scc) (Sloc, Cloc and Code)._',
              `_💰 COCOMO cost estimate in ${process.env.WAGE_LABEL}._`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            // Paginate — a PR can have more comments than one page, and the
            // sticky comment might be on a later page.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body?.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
