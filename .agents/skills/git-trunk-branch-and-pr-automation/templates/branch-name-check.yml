name: Branch Name Validation
# [AUTOMATED] Enforces branch naming on PRs: feature/fix/hotfix + AI-agent prefixes.

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  # Key on the PR number (not head_ref) so two PRs from same-named branches
  # (e.g. two forks' `patch-1`) don't share a group and cancel each other.
  group: branch-check-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        id: check
        env:
          BRANCH: ${{ github.head_ref }} # via env, never inline in run: (injection)
        run: |
          if [[ "$BRANCH" =~ ^(feature|fix|hotfix|claude|cursor|codex|copilot|codegen-bot|dependabot)/.+ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      # Only same-repo PRs: a fork's read-only token would 403 on the comment,
      # turning a validation failure into a confusing permissions failure. (Forks
      # still fail the "Fail if invalid" step below — they just get no comment.)
      - name: Update status comment
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        uses: actions/github-script@v9
        env:
          HEAD_REF: ${{ github.head_ref }}
          VALID: ${{ steps.check.outputs.valid }}
        with:
          script: |
            const marker = '<!-- branch-name-check -->';
            const branch = process.env.HEAD_REF;
            const valid = process.env.VALID === 'true';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            // Match the BOT's OWN sticky (author + marker), so a human who quotes the
            // marker isn't overwritten by updateComment.
            const existing = comments.find(
              (c) => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            );

            // Valid + no prior comment → stay quiet. Valid + prior comment → clear
            // the stale warning. Invalid → post/refresh the warning.
            if (valid && !existing) return;
            const body = valid
              ? `${marker}\n## 🌿 Branch name OK\n\n\`${branch}\` follows the convention.`
              : `${marker}
            ## 🌿 Invalid branch name

            \`${branch}\` must start with one of:

            - \`feature/\` · \`fix/\` · \`hotfix/\`
            - or an AI-agent prefix: \`claude/\` \`cursor/\` \`codex/\` \`copilot/\` \`codegen-bot/\` \`dependabot/\`

            e.g. \`feature/add-locale-toggle\`.`;
            if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });

      - name: Fail if invalid
        if: steps.check.outputs.valid == 'false'
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "::error::Invalid branch name '$BRANCH' — see the PR comment."
          exit 1
